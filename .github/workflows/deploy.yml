name: Deploy to Cloud Run

on:
  workflow_dispatch:

env:
  PROJECT_ID: vaidya-phr-dev
  REGION: asia-south1
  SERVICE: phr-backend
  REPO: vaidya-apps

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Google Auth
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Set up Cloud SDK
        uses: 'google-github-actions/setup-gcloud@v2'

      - name: Authorize Docker
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev

      - name: Build and Push Container
        run: |-
          docker build -f Dockerfile.prod -t "${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.SERVICE }}:${{ github.sha }}" .
          docker push "${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.SERVICE }}:${{ github.sha }}"

      - name: Deploy to Cloud Run
        uses: 'google-github-actions/deploy-cloudrun@v2'
        with:
          service: ${{ env.SERVICE }}
          region: ${{ env.REGION }}
          image: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.SERVICE }}:${{ github.sha }}
          flags: '--allow-unauthenticated --add-cloudsql-instances=${{ env.PROJECT_ID }}:${{ env.REGION }}:phr-db-dev'
          env_vars: |-
            PHR_ENVIRONMENT=production
            POSTGRES_USER=postgres
            POSTGRES_DB=phr
            PHR_LIMS_BASE_URL=https://dev-api.lims.vaidyahealth.com
          secret_env_vars: |-
            POSTGRES_PASSWORD=phr-db-password:latest
            PHR_SECRET_KEY=phr-secret-key:latest
