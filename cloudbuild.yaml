steps:
  # Build backend image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-f'
      - 'Dockerfile.prod'
      - '-t'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE_NAME}:$COMMIT_SHA'
      - '.'

  # Push backend image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE_NAME}:$COMMIT_SHA'

  # Deploy backend to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE_NAME}'
      - '--image'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE_NAME}:$COMMIT_SHA'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--service-account'
      - '${_RUNTIME_SA}'
      - '--add-cloudsql-instances=${_DB_INSTANCE}'
      - '--set-env-vars=ENVIRONMENT=${_ENVIRONMENT},CORS_ALLOW_ORIGINS=${_CORS_ALLOW_ORIGINS},APP_URL=${_APP_URL},RECORD_STORAGE_BACKEND=${_RECORD_STORAGE_BACKEND},GCS_BUCKET_NAME=${_GCS_BUCKET_NAME},GCS_UPLOAD_PREFIX=${_GCS_UPLOAD_PREFIX},LIMS_BASE_URL=${_LIMS_BASE_URL},INTERNAL_AUTH_MODE=${_INTERNAL_AUTH_MODE},INTERNAL_ALLOWED_SERVICE_ACCOUNTS=${_INTERNAL_ALLOWED_SERVICE_ACCOUNTS},SQL_ECHO=false,POSTGRES_DB=${_POSTGRES_DB},POSTGRES_HOST=${_POSTGRES_HOST},POSTGRES_USER=${_POSTGRES_USER}'
      - '--set-secrets=SECRET_KEY=${_SECRET_KEY_SECRET}:latest,POSTGRES_PASSWORD=${_POSTGRES_PASSWORD_SECRET}:latest'

images:
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE_NAME}:$COMMIT_SHA'

substitutions:
  _REGION: 'asia-south1'
  _AR_REPO: 'vaidya-apps'
  _SERVICE_NAME: 'phr-backend'
  _RUNTIME_SA: '299118511394-compute@developer.gserviceaccount.com'
  _DB_INSTANCE: 'vaidya-phr-dev:asia-south1:phr-db-dev'
  _ENVIRONMENT: 'production'
  _CORS_ALLOW_ORIGINS: 'https://phr-web-299118511394.asia-south1.run.app,https://dev.phr.vaidyahealth.com'
  _APP_URL: 'https://dev.phr.vaidyahealth.com'
  _RECORD_STORAGE_BACKEND: 'gcs'
  _GCS_BUCKET_NAME: 'vaidya-phr-uploads-dev'
  _GCS_UPLOAD_PREFIX: 'uploads'
  _LIMS_BASE_URL: 'https://dev-api.lims.vaidyahealth.com'
  _INTERNAL_AUTH_MODE: 'oidc'
  _INTERNAL_ALLOWED_SERVICE_ACCOUNTS: '331736313956-compute@developer.gserviceaccount.com'
  _POSTGRES_DB: 'phr'
  _POSTGRES_HOST: '/cloudsql/vaidya-phr-dev:asia-south1:phr-db-dev'
  _POSTGRES_USER: 'postgres'

  # Secret resource names only (values stay in Secret Manager)
  _SECRET_KEY_SECRET: 'phr-secret-key'
  _POSTGRES_PASSWORD_SECRET: 'phr-db-password'

options:
  logging: CLOUD_LOGGING_ONLY
